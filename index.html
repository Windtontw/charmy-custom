<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Charmy chan 向量互動上色</title>
<style>
:root{--bg:#faf7f2;--ink:#33333a;--mut:#8a8a96;--bd:#e3ded3;}
*{box-sizing:border-box;} body{margin:0;font-family:'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--ink);}
header{padding:14px 20px;border-bottom:1px solid var(--bd);background:#fff;} header h1{margin:0;font-size:18px;} header p{margin:4px 0 0;font-size:12.5px;color:var(--mut);}
.wrap{display:flex;gap:18px;padding:18px;align-items:flex-start;flex-wrap:wrap;}
.left{flex:1 1 380px;min-width:300px;background:#fff;border:1px solid var(--bd);border-radius:12px;padding:12px;text-align:center;}
.stage svg{max-width:100%;height:auto;max-height:74vh;}
.stage svg #fills path{cursor:pointer;} .stage svg image{pointer-events:none;} .stage svg #fills path:hover{opacity:.85;}
.mid{flex:0 0 240px;max-width:260px;} .right{flex:0 0 300px;max-width:320px;}
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px;} .card h2{margin:0 0 10px;font-size:14px;}
.tabs{display:flex;gap:8px;margin-bottom:6px;} .tab{flex:1;padding:9px;border:1px solid var(--bd);background:#fff;border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;} .tab.on{background:#33333a;color:#fff;border-color:#33333a;}
.sws{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.sw{position:relative;aspect-ratio:1;border:2px solid #d8d2c6;border-radius:9px;cursor:pointer;padding:0;} .sw span{position:absolute;inset:auto 0 2px;font-size:9px;color:#000;text-shadow:0 0 3px #fff,0 0 3px #fff;pointer-events:none;} .sw.on{outline:3px solid #ff4d8d;outline-offset:1px;}
.row{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:13px;flex-wrap:wrap;} .cur{width:30px;height:30px;border-radius:7px;border:2px solid #d8d2c6;}
.btns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;} .btn{flex:1;min-width:110px;padding:10px;border:1px solid var(--bd);background:#fff;border-radius:9px;cursor:pointer;font-size:13.5px;} .btn:hover{background:#f2efe8;} .btn.pri{background:#33333a;color:#fff;border-color:#33333a;}
.hint{font-size:12px;color:var(--mut);line-height:1.6;margin-top:8px;} #readout{font-size:12.5px;color:var(--mut);min-height:18px;margin-top:6px;} input[type=color]{width:38px;height:30px;border:none;background:none;cursor:pointer;}
.reglist{display:flex;flex-direction:column;gap:6px;max-height:64vh;overflow:auto;}
.regrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--bd);background:#fff;border-radius:9px;cursor:pointer;font-size:13.5px;text-align:left;width:100%;} .regrow:hover{background:#f7f2ea;border-color:#caa;}
.regchip{width:22px;height:22px;border-radius:6px;border:1px solid #bbb;flex:0 0 auto;} .regname{flex:1;} .reghead{font-size:11px;color:var(--mut);margin:4px 2px 0;}

.note{font-size:11.5px;color:#a4326b;background:#fff5f8;border:1px solid #f3d4e0;border-radius:7px;padding:6px 9px;margin-top:8px;line-height:1.5;}
.presets{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.preset{padding:9px;border:1px solid var(--bd);background:#fff;border-radius:9px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;}
.preset:hover{background:#f7f2ea;} .preset i{width:14px;height:14px;border-radius:4px;border:1px solid #bbb;display:inline-block;flex:0 0 auto;}
.seclist{display:flex;flex-direction:column;}
.schemerow{display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--bd);border-radius:9px;margin-top:7px;font-size:13px;}
.schemerow .nm{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.schemerow .dots{display:flex;gap:2px;flex:0 0 auto;} .schemerow .dots i{width:11px;height:11px;border-radius:2px;border:1px solid #ccc;display:inline-block;}
.minibtn{padding:4px 8px;border:1px solid var(--bd);background:#fff;border-radius:7px;cursor:pointer;font-size:12px;flex:0 0 auto;} .minibtn:hover{background:#f2efe8;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:50;padding:24px;overflow:auto;} .overlay.on{display:block;}
.cmpwrap{background:#fff;border-radius:14px;padding:18px;max-width:1100px;margin:0 auto;}
.cmpgrid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.cmpcell{flex:0 0 220px;text-align:center;border:1px solid var(--bd);border-radius:10px;padding:10px;background:#fff;}
.cmpcell svg{max-width:100%;height:auto;max-height:300px;} .cmpcell .t{font-size:13px;font-weight:700;margin-bottom:6px;}
.closebtn{float:right;border:none;background:#33333a;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;}
header{position:relative;}.langbar{position:absolute;top:12px;right:16px;display:flex;gap:6px;}.lang{padding:5px 11px;border:1px solid var(--bd);background:#fff;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}.lang.on{background:#33333a;color:#fff;border-color:#33333a;}.allrow{background:#fff3d6;border-color:#e8c878!important;font-weight:700;}.allrow:hover{background:#ffe9b3!important;}.allrow .regchip{background:linear-gradient(135deg,#ff8fb1,#ffd23f,#9fd4e8)!important;}.speclist{display:flex;flex-direction:column;gap:4px;}.specrow{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;border-bottom:1px dashed var(--bd);}.specchip{width:18px;height:18px;border-radius:5px;border:1px solid var(--bd);flex:0 0 auto;}.specname{flex:0 0 92px;font-weight:700;}.specpan{flex:0 0 108px;}.spechex{color:var(--mut);font-size:11px;}
/* 配色表僅供匯出，不顯示在畫面上 */
#speccard,#presetcard,[data-i18n="hint_action"]{display:none!important;}
/* ===== 手機版面：娃娃(窄)＋區塊選單並排、色票移到下方；觸控優化 2026-06 ===== */
@media (max-width:760px){
  header{position:static;padding:8px 12px;}
  header h1{font-size:15px;}
  header p{display:none;}
  .langbar{position:static;justify-content:flex-end;margin-top:4px;}
  .lang{padding:8px 14px;font-size:14px;}
  /* 上排兩欄：左娃娃、右區塊選單；色票等移到下方整排 */
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;align-items:start;}
  .left{grid-column:1;min-width:0;margin:0;padding:6px;position:relative;background:#fff;border:1px solid var(--bd);border-radius:12px;}
  .mid{grid-column:2;min-width:0;max-width:none;}
  .right{grid-column:1 / -1;min-width:0;max-width:none;}
  /* 款式切換：娃娃右上角小膠囊 */
  .tabs{position:absolute;top:8px;right:8px;z-index:6;margin:0;width:auto;gap:5px;}
  .tab{flex:0 0 auto;padding:5px 10px;font-size:12px;border-radius:16px;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.12);}
  .stage{overflow:hidden;touch-action:none;}
  .stage svg{max-height:30vh;}
  .zoomhint{font-size:11px;color:var(--mut);margin-top:4px;}
  #readout{display:none;}
  .mid .card{margin:0;padding:8px;}
  .mid .card h2{font-size:13px;margin-bottom:4px;}
  .mid .reghead,.mid p{font-size:10px;margin:2px 0;}
  .reglist{max-height:30vh;overflow:auto;gap:6px;}
  .regrow{padding:9px 8px;font-size:13px;min-height:44px;}
  .regchip{width:20px;height:20px;}
  /* 下方色票放大成 6 欄整排 */
  .right .card:first-child{margin-bottom:10px;}
  .sws{grid-template-columns:repeat(6,1fr);gap:8px;}
  .sw{border-radius:9px;}
  .sw span{font-size:10px;}
  /* 觸控目標放大、消除點擊延遲 */
  .sw,.tab,.btn,.regrow,.preset,.minibtn,.lang,.schemerow,.allrow,input[type=color],.cur{touch-action:manipulation;}
  .btn{padding:13px;min-width:120px;font-size:14.5px;}
  .btns{gap:10px;}
  .preset{padding:12px;font-size:14px;}
  .minibtn{padding:8px 12px;font-size:13px;}
  .cur{width:40px;height:40px;}
  input[type=color]{width:48px;height:40px;}
  .row{font-size:14px;gap:12px;}
  .overlay{padding:10px;}
  .cmpwrap{padding:12px;}
  .cmpcell{flex:0 0 150px;}
}
